name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init TWA
        run: |
          bubblewrap init --manifest="https://platiz.vercel.app/manifest.json" --directory="./twa"
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Update keystore
        run: |
          keytool -genkey -v -keystore ./twa/android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=GD, OU=GD, O=GD, L=CA, ST=DC, C=VE" -noprompt
          echo "storeFile=android.keystore" >> ./twa/gradle.properties
          echo "storePassword=android" >> ./twa/gradle.properties
          echo "keyAlias=android" >> ./twa/gradle.properties
          echo "keyPassword=android" >> ./twa/gradle.properties

      - name: Build APK
        working-directory: ./twa
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GlobalDorado-APK
          path: twa/app/build/outputs/apk/release/*.apk

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Global Dorado v${{ github.run_number }}
          files: twa/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
