<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data: blob:; media-src 'self' https: blob:; connect-src 'self' https:; frame-src 'self' https://www.youtube.com https://drive.google.com; frame-ancestors 'none';" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Global Dorado" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;0,6..96,700;1,6..96,400&display=swap" rel="stylesheet" />
    <title>Global Dorado - Transforma el Internet en Dinero</title>
  </head>
  <body class="bg-[#0a0a0f] text-white antialiased">
    <div id="root"><div style="color:#FFD700;text-align:center;padding-top:40vh;font-family:system-ui"><p style="font-size:20px">Global Dorado</p><p id="loading-msg" style="color:#888;font-size:14px">Cargando...</p></div></div>
    <noscript><div style="color:red;text-align:center;padding:40px;font-family:monospace">JavaScript esta desactivado. Activalo para usar la plataforma.</div></noscript>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function(){
        var el = document.getElementById('loading-msg');
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs){ regs.forEach(function(r){ r.unregister(); }); });
        }
        window.addEventListener('error', function(e){
          if (el) { el.style.color = 'red'; el.textContent = 'JS Error: ' + (e.message || e.filename || 'desconocido'); }
        });
        if (!document.querySelector('script[type="module"][src]') && !document.querySelector('script[type="module"][crossorigin]')) {
          setTimeout(function(){
            var scripts = document.querySelectorAll('script[type="module"]');
            if (scripts.length === 0 && el) { el.style.color = 'red'; el.textContent = 'Error: JS module no cargado'; }
          }, 5000);
        }
      })();
    </script>
  </body>
</html>
