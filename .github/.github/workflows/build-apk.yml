name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias gd -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=GD, OU=GD, O=GD, L=CA, ST=DC, C=VE" -noprompt

      - name: Init Bubblewrap project
        run: |
          echo "n" | bubblewrap init --manifest="https://platiz.vercel.app/manifest.json" --directory="./app"

      - name: Build APK
        working-directory: ./app
        run: |
          echo "android.useAndroidX=true" >> gradle.properties
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GlobalDorado
          path: app/app/build/outputs/apk/release/*.apk

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Global Dorado v${{ github.run_number }}
          files: app/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
